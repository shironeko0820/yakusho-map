<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>役所座標ジオコーダー</title>
<style>
  body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
  h1 { font-size: 1.3em; color: #333; }
  #status { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin: 16px 0; }
  progress { width: 100%; height: 20px; margin: 8px 0; }
  #log { background: #1e1e1e; color: #ccc; font-size: 12px; height: 200px; overflow-y: auto;
         padding: 10px; border-radius: 4px; font-family: monospace; }
  button { padding: 10px 24px; font-size: 14px; border: none; border-radius: 6px; cursor: pointer; }
  #startBtn { background: #1a73e8; color: #fff; }
  #startBtn:disabled { background: #aaa; cursor: not-allowed; }
  #downloadBtn { background: #34a853; color: #fff; display: none; margin-top: 12px; }
  .stat { font-size: 14px; color: #555; }
</style>
</head>
<body>
<h1>🗺️ 役所座標ジオコーダー（Google Maps API）</h1>
<p style="color:#555;font-size:14px;">
  data.json の全役所座標を Google Geocoding API で建物実位置に更新します。<br>
  完了後に data.json をダウンロードしてください。
</p>

<div id="status">
  <div class="stat" id="statText">準備完了 — 「開始」を押してください</div>
  <progress id="prog" value="0" max="100"></progress>
  <div class="stat" id="countText">0 / 0</div>
</div>

<button id="startBtn" onclick="startGeocoding()">▶ ジオコーディング開始</button>
<button id="downloadBtn" onclick="downloadResult()">⬇ data.json をダウンロード</button>

<br><br>
<div id="log"></div>

<script>
const MAPS_KEY = 'AIzaSyD4myQ-yye_b-uoEQEk_Bntf3nS_00YSWc';
let geocoder = null;
let resultData = null;

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function loadMapsAPI() {
  return new Promise((resolve) => {
    window.__geocoderReady = resolve;
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&callback=__geocoderReady&language=ja`;
    document.head.appendChild(s);
  });
}

function geocodeOne(entry) {
  return new Promise((resolve) => {
    const query = entry.name + ' ' + (entry.pref || '');
    geocoder.geocode({ address: query, region: 'JP', language: 'ja' }, (results, status) => {
      if (status === 'OK' && results.length > 0) {
        const loc = results[0].geometry.location;
        resolve({ ...entry, lat: Math.round(loc.lat() * 1e5) / 1e5, lng: Math.round(loc.lng() * 1e5) / 1e5 });
      } else {
        resolve(entry); // 失敗時は元の座標を維持
      }
    });
  });
}

async function startGeocoding() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('statText').textContent = 'Google Maps API を読み込み中...';

  await loadMapsAPI();
  geocoder = new google.maps.Geocoder();
  log('Maps API 読み込み完了');

  let data;
  try {
    const res = await fetch('./data.json');
    data = await res.json();
    log(`data.json 読み込み完了: ${data.length} 件`);
  } catch (e) {
    log('ERROR: data.json の読み込みに失敗 - ' + e.message);
    return;
  }

  const prog = document.getElementById('prog');
  const countText = document.getElementById('countText');
  prog.max = data.length;

  const updated = [];
  let successCount = 0;
  let skipCount = 0;
  const DELAY_MS = 200; // Google Maps JS API レート制限対策

  for (let i = 0; i < data.length; i++) {
    const entry = data[i];
    const newEntry = await geocodeOne(entry);

    if (newEntry.lat !== entry.lat || newEntry.lng !== entry.lng) {
      successCount++;
    } else {
      skipCount++;
    }
    updated.push(newEntry);

    prog.value = i + 1;
    countText.textContent = `${i + 1} / ${data.length}  (更新: ${successCount}  維持: ${skipCount})`;
    if ((i + 1) % 50 === 0) {
      document.getElementById('statText').textContent = `処理中... ${i + 1} / ${data.length}`;
      log(`[${i + 1}/${data.length}] 更新=${successCount} 維持=${skipCount}`);
    }

    await new Promise(r => setTimeout(r, DELAY_MS));
  }

  resultData = updated;
  document.getElementById('statText').textContent = `✅ 完了！ 更新: ${successCount} 件 / 維持: ${skipCount} 件`;
  log(`=== 完了 === 更新=${successCount}  維持=${skipCount}`);
  document.getElementById('downloadBtn').style.display = 'inline-block';
}

function downloadResult() {
  if (!resultData) return;
  const json = JSON.stringify(resultData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data.json';
  a.click();
  URL.revokeObjectURL(url);
  log('data.json をダウンロードしました。');
}
</script>
</body>
</html>
