/* =========================================================
   設定
   ========================================================= */
const DATA_URL = './data.json'; // 静的JSONから読み込み（Vercel CDN配信）

/* =========================================================
   グローバル変数
   ========================================================= */
let map, clusterer, infoWindow;
let allOffices = [];
let myLocationMarker = null;
let colorMode = 'none';
let currentOffices = [];
let currentIsNearby = false;
let _idleTimer = null;
let _infoOpen = false;
let currentMarkers = [];
const ZOOM_VIEWPORT = 9; // このズーム以上でビューポート絞り込みを適用

/* =========================================================
   Google Maps 初期化
   ========================================================= */
async function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 36.5, lng: 137.5 },
    zoom: 5,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
    styles: [
      { featureType: "poi.business", stylers: [{ visibility: "off" }] }
    ]
  });
  infoWindow = new google.maps.InfoWindow();

  setProgress(10, 'データを読み込み中...');

  try {
    allOffices = await loadOffices();
    document.getElementById('errorBanner').style.display = 'none';
  } catch (e) {
    console.error('data.json fetch failed:', e);
    allOffices = FALLBACK;
    document.getElementById('errorBanner').style.display = 'block';
  } finally {
    setProgress(90, 'マーカーを配置中...');
    buildPrefSelect(allOffices);
    renderMarkers(allOffices);
    infoWindow.addListener('closeclick', () => { _infoOpen = false; });
    map.addListener('idle', () => {
      if (_infoOpen) return;
      if (_idleTimer) clearTimeout(_idleTimer);
      _idleTimer = setTimeout(_applyViewport, 200);
    });
    setProgress(100, '完了');
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
    }, 300);
  }
}

/* =========================================================
   静的 data.json から自治体データを取得
   ========================================================= */
async function loadOffices() {
  setProgress(40, 'data.json を読み込み中...');
  const res = await fetch(DATA_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  setProgress(75, 'データを解析中...');
  const data = await res.json();
  setProgress(85, `${data.length} 件を読み込みました`);
  return data;
}

/* =========================================================
   マーカー描画（MarkerClusterer使用）
   ========================================================= */
function renderMarkers(offices, isNearby = false) {
  currentOffices = offices;
  currentIsNearby = isNearby;
  _applyViewport();
}

const _svgCache = {};
function _buildMarkerSvg(color) {
  if (_svgCache[color]) return _svgCache[color];
  const svg =
    '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">' +
    '<ellipse cx="14" cy="35" rx="4" ry="1.5" fill="rgba(0,0,0,0.2)"/>' +
    '<path d="M14 1C7.9 1 3 6 3 12c0 7.5 11 23 11 23S25 19.5 25 12C25 6 20.1 1 14 1z"' +
      ' fill="' + color + '" stroke="white" stroke-width="1.5"/>' +
    '<path d="M7 15h14M7 15V9h14v6M7 9l7-4 7 4M11 15v-4h6v4"' +
      ' stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg>';
  _svgCache[color] = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
  return _svgCache[color];
}

function _buildIcon(office) {
  const color = colorMode === 'none' ? '#1a73e8' : getMarkerColor(office);
  return {
    url: _buildMarkerSvg(color),
    scaledSize: new google.maps.Size(28, 36),
    anchor: new google.maps.Point(14, 36),
  };
}

function _flushMarkers(offices) {
  if (clusterer) { clusterer.clearMarkers(); }
  const markers = offices.map(office => {
    const marker = new google.maps.Marker({
      position: { lat: office.lat, lng: office.lng },
      title: office.name,
      icon: _buildIcon(office),
    });
    marker.addListener('click', () => openInfo(marker, office));
    return marker;
  });
  currentMarkers = markers.map((marker, i) => ({ marker, office: offices[i] }));
  clusterer = new markerClusterer.MarkerClusterer({ map, markers });
}

function _refreshIcons() {
  currentMarkers.forEach(({ marker, office }) => {
    marker.setIcon(_buildIcon(office));
  });
}

function _applyViewport() {
  const zoom = map.getZoom();
  let offices;
  if (zoom >= ZOOM_VIEWPORT && !currentIsNearby) {
    const bounds = map.getBounds();
    if (!bounds) {
      offices = currentOffices;
    } else {
      const ne = bounds.getNorthEast();
      const sw = bounds.getSouthWest();
      const latPad = (ne.lat() - sw.lat()) * 0.3;
      const lngPad = (ne.lng() - sw.lng()) * 0.3;
      offices = currentOffices.filter(o =>
        o.lat >= sw.lat() - latPad && o.lat <= ne.lat() + latPad &&
        o.lng >= sw.lng() - lngPad && o.lng <= ne.lng() + lngPad
      );
    }
  } else {
    offices = currentOffices;
  }
  _flushMarkers(offices);
  const total = currentOffices.length;
  const shown = offices.length;
  if (currentIsNearby) {
    document.getElementById('stats').textContent = `📍 近くの役所 TOP${total}`;
  } else if (zoom >= ZOOM_VIEWPORT && shown < total) {
    document.getElementById('stats').textContent = `${total.toLocaleString()} 件中 ${shown.toLocaleString()} 件表示中`;
  } else {
    document.getElementById('stats').textContent = `${total.toLocaleString()} 件表示中`;
  }
}

function getMarkerColor(office) {
  if (colorMode === 'fiscalStrength') {
    const v = office.fiscalStrength;
    if (v == null) return '#888780';
    if (v >= 1.0) return '#3B6D11';
    if (v >= 0.7) return '#639922';
    if (v >= 0.5) return '#EF9F27';
    if (v >= 0.3) return '#E24B4A';
    return '#A32D2D';
  }
  if (colorMode === 'furusatoNet') {
    const v = office.furusatoNet;
    if (v == null) return '#888780';
    const oku = v / 1e8;
    if (oku >= 50)  return '#3B6D11';
    if (oku >= 5)   return '#639922';
    if (oku >= -5)  return '#EF9F27';
    if (oku >= -50) return '#E24B4A';
    return '#A32D2D';
  }
  if (colorMode === 'waterRate') {
    const v = office.waterRate;
    if (v == null) return '#888780';
    if (v <= 2000) return '#1565C0';
    if (v <= 2800) return '#1a73e8';
    if (v <= 3400) return '#EF9F27';
    if (v <= 4200) return '#E24B4A';
    return '#A32D2D';
  }
  return '#1a73e8';
}

function setColorMode(mode) {
  colorMode = mode;
  const legend = document.getElementById('ccLegend');
  if (mode === 'none') {
    legend.classList.remove('show');
  } else {
    legend.classList.add('show');
    const [l1, l2, l3] = mode === 'fiscalStrength'
      ? ['0.2以下', '0.5', '1.0以上']
      : mode === 'waterRate'
      ? ['〜2,000円', '3,400円', '4,200円〜']
      : ['流出', '均衡', '受益'];
    const barColors = mode === 'waterRate'
      ? ['#1565C0', '#1a73e8', '#EF9F27', '#E24B4A', '#A32D2D']
      : ['#A32D2D', '#E24B4A', '#EF9F27', '#639922', '#3B6D11'];
    legend.querySelectorAll('.cc-bar div').forEach((d, i) => { d.style.background = barColors[i]; });
    document.getElementById('ccL1').textContent = l1;
    document.getElementById('ccL2').textContent = l2;
    document.getElementById('ccL3').textContent = l3;
  }
  if (currentMarkers.length > 0) _refreshIcons();
  else if (currentOffices.length > 0) renderMarkers(currentOffices, currentIsNearby);
}

function iwSwitchTab(n) {
  document.querySelectorAll('.iw-tab-btn').forEach((b, i) => b.classList.toggle('active', i === n));
  document.querySelectorAll('.iw-tab-content').forEach((c, i) => c.classList.toggle('active', i === n));
}

function iwRow(icon, label, valueHtml) {
  return `<div class="iw-row"><span class="icon">${icon}</span><span class="value">${label}: ${valueHtml}</span></div>`;
}
function iwRowNa(icon, label) {
  return `<div class="iw-row iw-row-na"><span class="icon">${icon}</span><span class="value">${label}:<br><span style="font-size:11px;padding-left:2px">− （未実装）</span></span></div>`;
}

function popSparkSvg(o) {
  const pops = [o.pop2020, o.population, o.pop2030, o.pop2040];
  const yrs  = ['20',     '24',          '30',       '40'];
  const W = 215, CH = 20, LH = 11;
  const PAD = 6, years = [2020, 2024, 2030, 2040];
  const cw = W - PAD * 2;
  const xs = years.map(yr => PAD + (yr - 2020) / 20 * cw);
  const mn = Math.min(...pops), mx = Math.max(...pops);
  const rng = mx - mn || 1;
  const VP = 2;
  const ys = pops.map(v => VP + (1 - (v - mn) / rng) * (CH - VP * 2));
  const pct = (o.pop2040 - o.population) / o.population * 100;
  const tc = pct >= 0 ? '#1a73e8' : pct > -15 ? '#e37400' : '#c5221f';
  const badge = `${pct >= 0 ? '▲' : '▼'}${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%`;
  const lbls = yrs.map((y, i) =>
    `<text x="${xs[i]}" y="${CH + LH}" text-anchor="middle" font-size="9" fill="#bbb">${y}</text>`
  ).join('');
  const dots = [0, 1, 3].map(i =>
    `<circle cx="${xs[i]}" cy="${ys[i]}" r="${i === 1 ? 3 : 2.5}" fill="${i === 3 ? tc : '#1a73e8'}" stroke="white" stroke-width="1"/>`
  ).join('');
  const trendX = xs[3] - 2, trendY = Math.min(ys[3] - 4, CH - 2);
  return `<svg width="${W}" height="${CH + LH}" xmlns="http://www.w3.org/2000/svg" style="display:block;margin-top:2px;overflow:visible">` +
    `<path d="M${xs[0]},${ys[0]}L${xs[1]},${ys[1]}" stroke="#1a73e8" stroke-width="2" fill="none" stroke-linecap="round"/>` +
    `<path d="M${xs[1]},${ys[1]}L${xs[2]},${ys[2]}L${xs[3]},${ys[3]}" stroke="#bbb" stroke-width="1.5" stroke-dasharray="3,3" fill="none" stroke-linecap="round"/>` +
    dots + lbls +
    `<text x="${trendX}" y="${trendY}" font-size="9.5" fill="${tc}" text-anchor="end" font-weight="600">${badge}</text>` +
    `</svg>`;
}
function iwFurusato(recv, deduct) {
  const net     = recv - deduct;
  const netOku  = (net  / 1e8).toFixed(1);
  const recvOku = (recv / 1e8).toFixed(1);
  const dOku    = (deduct / 1e8).toFixed(1);
  const netStr  = net >= 0 ? '+' + netOku : netOku;
  const c       = net >= 0 ? '#188038' : '#c5221f';
  return `<strong style="color:${c}">純収支 ${netStr}億円</strong><br><span class="iw-sub">2024年度決算</span><div class="iw-furusato-detail"><span>📥 受入 ${recvOku}億円</span><span>📤 住民税控除 ${dOku}億円</span></div>`;
}
function iwExpTop3(top3) {
  const rows = top3.map((item, i) => {
    const fill = Math.min(item.p, 100);
    return `<div class="iw-exp-row">
      <span class="iw-exp-rank">${i+1}</span>
      <span class="iw-exp-name">${item.l}</span>
      <span class="iw-exp-bar-wrap"><span class="iw-exp-bar-fill" style="width:${fill}%"></span></span>
      <span class="iw-exp-pct">${item.p}%</span>
      <span class="iw-exp-amt">${item.a}億円</span>
    </div>`;
  }).join('');
  return `<div class="iw-exp">
    <div class="iw-exp-title"><span class="icon">💰</span><span style="color:#333">歳出トップ3</span><span class="iw-sub" style="display:inline;margin-left:4px">2023年度</span></div>
    ${rows}
  </div>`;
}

/* =========================================================
   都道府県セレクトボックス構築
   ========================================================= */
function buildPrefSelect(offices) {
  const sel = document.getElementById('prefSelect');
  const current = sel.value;
  // 既存オプションをクリア（最初の「全て」以外）
  while (sel.options.length > 1) sel.remove(1);

  const inData = new Set(offices.map(o => o.pref).filter(Boolean));
  // コード順で並べ、データに存在するものだけ表示
  const prefs = PREF_ORDER.filter(p => inData.has(p));
  prefs.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    sel.appendChild(opt);
  });
  sel.value = current;
}

/* =========================================================
   検索・リセット
   ========================================================= */
function search() {
  const pref = document.getElementById('prefSelect').value;
  const kw   = document.getElementById('searchInput').value.trim().toLowerCase();

  const result = allOffices.filter(o => {
    const matchPref = !pref || o.pref === pref;
    const matchKw   = !kw ||
      o.name.toLowerCase().includes(kw) ||
      (o.address || '').toLowerCase().includes(kw) ||
      o.pref.toLowerCase().includes(kw);
    return matchPref && matchKw;
  });

  renderMarkers(result);
  infoWindow.close();

  if (result.length === 1) {
    map.setCenter({ lat: result[0].lat, lng: result[0].lng });
    map.setZoom(15);
  } else if (result.length > 1 && pref) {
    const lats = result.map(o => o.lat);
    const lngs = result.map(o => o.lng);
    map.fitBounds(new google.maps.LatLngBounds(
      { lat: Math.min(...lats), lng: Math.min(...lngs) },
      { lat: Math.max(...lats), lng: Math.max(...lngs) }
    ));
  }
}

function resetMap() {
  document.getElementById('prefSelect').value = '';
  document.getElementById('searchInput').value = '';
  // 現在地マーカーを削除
  if (myLocationMarker) {
    myLocationMarker.setMap(null);
    myLocationMarker = null;
  }
  // distプロパティをクリア
  allOffices.forEach(o => delete o.dist);
  renderMarkers(allOffices);
  map.setCenter({ lat: 36.5, lng: 137.5 });
  map.setZoom(5);
  infoWindow.close();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});

/* =========================================================
   現在地から近くの役所を検索
   ========================================================= */
function locateMe() {
  const btn = document.getElementById('locateBtn');

  if (!navigator.geolocation) {
    alert('このブラウザは位置情報の取得に対応していません');
    return;
  }

  btn.disabled = true;
  btn.textContent = '📍 取得中...';
  infoWindow.close();

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      // 現在地マーカーを配置
      if (myLocationMarker) myLocationMarker.setMap(null);
      myLocationMarker = new google.maps.Marker({
        position: { lat, lng },
        map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 11,
          fillColor: '#4285F4',
          fillOpacity: 1,
          strokeColor: '#ffffff',
          strokeWeight: 3,
        },
        title: '現在地',
        zIndex: 999,
      });

      // 全役所の距離を計算・近い順TOP10
      const TOP_N = 10;
      const sorted = allOffices
        .map(o => ({ ...o, dist: haversine(lat, lng, o.lat, o.lng) }))
        .sort((a, b) => a.dist - b.dist)
        .slice(0, TOP_N);

      renderMarkers(sorted, true);

      // 現在地 + TOP10が収まるようにfitBounds
      const bounds = new google.maps.LatLngBounds();
      bounds.extend({ lat, lng });
      sorted.forEach(o => bounds.extend({ lat: o.lat, lng: o.lng }));
      map.fitBounds(bounds, { top: 60, right: 20, bottom: 20, left: 20 });

      // 最寄りの役所のInfoWindowを自動表示
      const nearest = sorted[0];
      const nearestMarker = clusterer.markers[0];
      if (nearestMarker) openInfo(nearestMarker, nearest);

      btn.disabled = false;
      btn.textContent = '📍 現在地';
    },
    err => {
      const msg = {
        1: '位置情報の使用が許可されていません。\nブラウザの設定から許可してください。',
        2: '位置情報を取得できませんでした。',
        3: '位置情報の取得がタイムアウトしました。',
      };
      alert(msg[err.code] || '位置情報の取得に失敗しました。');
      btn.disabled = false;
      btn.textContent = '📍 現在地';
    },
    { timeout: 10000, maximumAge: 60000, enableHighAccuracy: false }
  );
}

/* =========================================================
   2点間の距離（km）— Haversine公式
   ========================================================= */
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

   財政フローパネル（サンキー図）
   ========================================================= */
let _fiscalData = null;
const _INCOME_LABELS  = ['地方税','地方交付税','国庫支出金','都道府県支出金','地方債','その他歳入'];
const _EXPENSE_LABELS = ['総務費','民生費','衛生費','土木費','教育費','公債費','その他歳出'];

function _fiscalKey(name, pref) {
  let city = name.replace(/(役所|役場)$/, '');
  const mG = city.match(/^.+郡(.+(町|村))$/);
  if (mG) city = mG[1];
  const mK = name.match(/^(.+市)[^市]+区役所$/);
  if (mK) city = mK[1];
  return `${pref}|${city}`;
}

async function _loadFiscal() {
  if (_fiscalData) return;
  const res = await fetch('/fiscal_detail.json');
  const arr = await res.json();
  _fiscalData = {};
  for (const item of arr) _fiscalData[item.k] = item;
}

function _loadGoogleCharts() {
  return new Promise((resolve, reject) => {
    if (window._gChartsReady) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://www.gstatic.com/charts/loader.js';
    s.onload = () => {
      google.charts.load('current', {packages: ['sankey'], language: 'ja'});
      google.charts.setOnLoadCallback(() => { window._gChartsReady = true; resolve(); });
    };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

const _YEAR_LABELS = { R2:'2020年度', R3:'2021年度', R4:'2022年度', R5:'2023年度', R6:'2024年度' };
let _currentFd = null;   // 現在表示中のfiscal entry

async function openFiscal(name, pref) {
  const panel = document.getElementById('fiscalPanel');
  document.getElementById('fpTitle').textContent = name;
  document.getElementById('fpSubtitle').textContent = '読み込み中...';
  document.getElementById('fpChart').innerHTML = '';
  document.getElementById('fpTabs').style.display = 'none';
  panel.classList.add('open');

  try {
    await Promise.all([_loadFiscal(), _loadGoogleCharts()]);
    const key = _fiscalKey(name, pref);
    const fd  = _fiscalData[key] || _fiscalData[key.replace(/ヶ/g, 'ケ')];
    if (!fd) {
      document.getElementById('fpSubtitle').textContent = '財政データなし';
      document.getElementById('fpChart').innerHTML =
        '<p style="padding:24px;color:#999;text-align:center">このデータは収録されていません</p>';
      return;
    }
    _currentFd = fd;
    _buildYearTabs(fd);
    const _latestYr = ['R6','R5','R4','R3','R2'].find(yr =>
      yr === 'R5' || (fd.h && fd.h[yr])
    ) || 'R5';
    _showYear(_latestYr, fd);
  } catch(err) {
    document.getElementById('fpSubtitle').textContent = 'エラー';
    document.getElementById('fpChart').innerHTML =
      '<p style="padding:24px;color:#c5221f;text-align:center">データ取得に失敗しました</p>';
  }
}

function _buildYearTabs(fd) {
  const tabsEl = document.getElementById('fpTabs');
  const available = ['R6','R5','R4','R3','R2'].filter(yr =>
    yr === 'R5' || (fd.h && fd.h[yr])
  );
  if (available.length <= 1) { tabsEl.style.display = 'none'; return; }

  const tabYrs  = available.slice(0, 3);   // 直近3年 → タブ
  const dropYrs = available.slice(3);       // それ以前 → プルダウン

  let html = tabYrs.map(yr =>
    `<button class="fp-tab" data-yr="${yr}" onclick="_switchYear('${yr}')">${_YEAR_LABELS[yr].replace('年度','')}</button>`
  ).join('');

  if (dropYrs.length > 0) {
    html += `<select class="fp-year-select" id="fpYearSelect"
               onchange="if(this.value) _switchYear(this.value)">
               <option value="">過去 ▾</option>
               ${dropYrs.map(yr => `<option value="${yr}">${_YEAR_LABELS[yr]}</option>`).join('')}
             </select>`;
  }

  tabsEl.style.display = 'flex';
  tabsEl.innerHTML = html;
}

function _switchYear(yr) {
  if (!_currentFd || !yr) return;
  // タブのアクティブ切り替え
  document.querySelectorAll('.fp-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.yr === yr)
  );
  // プルダウンの状態更新
  const sel = document.getElementById('fpYearSelect');
  if (sel) {
    const isDropYr = Array.from(sel.options).some(o => o.value === yr);
    sel.value = isDropYr ? yr : '';
    sel.classList.toggle('selected', isDropYr);
  }
  _showYear(yr, _currentFd);
}

function _showYear(yr, fd) {
  const data = yr === 'R5' ? { i: fd.i, e: fd.e } : (fd.h && fd.h[yr]);
  if (!data) return;
  // アクティブタブ
  document.querySelectorAll('.fp-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.yr === yr)
  );
  // サブタイトル（歳入 / 歳出 / 収支）
  const totalI   = data.i.reduce((a, b) => a + b, 0);
  const totalE   = data.e.reduce((a, b) => a + b, 0);
  const balance  = totalI - totalE;
  const fmt = v  => (Math.round(Math.abs(v) / 1000) / 100).toLocaleString();
  const balStr   = (balance < 0 ? '-' : '') + fmt(balance) + '億円';
  const balColor = balance < 0 ? '#c5221f' : '#202124';
  document.getElementById('fpSubtitle').innerHTML =
    `歳入：${fmt(totalI)}億円 / 歳出：${fmt(totalE)}億円　収支：<span style="color:${balColor};font-weight:700">${balStr}</span>　（${_YEAR_LABELS[yr]}決算）`;
  _drawSankey(data);
}

function _oku(v) { return (v / 100000).toFixed(1) + '億円'; }

function _drawSankey(data) {
  const dt = new google.visualization.DataTable();
  dt.addColumn('string', '歳入');
  dt.addColumn('string', '歳出');
  dt.addColumn('number', '金額');
  dt.addColumn({type: 'string', role: 'tooltip'});
  const C = '一般会計';
  const rows = [];
  _INCOME_LABELS.forEach((l, i)  => {
    if (data.i[i] > 0) rows.push([l, C, data.i[i], `${l} → ${C}\n${_oku(data.i[i])}`]);
  });
  _EXPENSE_LABELS.forEach((l, i) => {
    if (data.e[i] > 0) rows.push([C, l, data.e[i], `${C} → ${l}\n${_oku(data.e[i])}`]);
  });
  dt.addRows(rows);
  const chartDiv = document.getElementById('fpChart');
  const h = Math.max(320, Math.min(480, chartDiv.offsetHeight - 8));
  new google.visualization.Sankey(chartDiv).draw(dt, {
    height: h,
    sankey: {
      node: {
        label: { fontSize: 11, fontName: 'Hiragino Sans, Meiryo, sans-serif', bold: false },
        width: 10, nodePadding: 10, interactivity: true
      },
      link: { colorMode: 'gradient' }
    }
  });
}

  document.getElementById('fiscalPanel').classList.remove('open');
}

function openRanking() {
  document.getElementById('rankingPanel').classList.add('open');
  if (!_rkReady) _initRanking();
}

  document.getElementById('rankingPanel').classList.remove('open');

function _initRanking() {
  const inData = new Set(allOffices.map(o => o.pref));
  const prefs  = PREF_ORDER.filter(p => inData.has(p));
  const sel    = document.getElementById('rkPrefFilter');
  prefs.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  });
  _rkReady = true;
  renderRanking();
}

function switchRkTab(n) {
  _rkTab  = n;
  _rkSort = { key: 'code', asc: true };
  document.querySelectorAll('.rk-tab-btn').forEach((b, i) => b.classList.toggle('active', i === n));
  renderRanking();
}

function sortRanking(key) {
  if (_rkSort.key === key) {
    _rkSort.asc = !_rkSort.asc;
  } else {
    _rkSort.key = key;
    _rkSort.asc = (key === 'code' || key === 'name' || key === 'pref');
  }
  renderRanking();
}

function renderRanking() {
  const pref       = document.getElementById('rkPrefFilter').value;
  const { key, asc } = _rkSort;
  let data = pref ? allOffices.filter(o => o.pref === pref) : allOffices.slice();

  const pop40r = (o) => (o.population && o.pop2040) ? (o.pop2040 - o.population) / o.population : -999;

  data.sort((a, b) => {
    let va, vb;
    switch (key) {
      case 'code':  va = a.code||'zzz'; vb = b.code||'zzz'; break;
      case 'name':  va = a.name; vb = b.name; break;
      case 'pref':  va = a.pref; vb = b.pref; break;
      case 'pop':   va = a.population||0; vb = b.population||0; break;
      case 'pop40': va = pop40r(a); vb = pop40r(b); break;
      case 'tfr':   va = a.tfr??-1; vb = b.tfr??-1; break;
      case 'age':   va = a.agingRate??-1; vb = b.agingRate??-1; break;
      case 'inc':   va = a.incomePerCapita??-1; vb = b.incomePerCapita??-1; break;
      case 'far':   va = (a.finAdj&&a.stdFin)?a.finAdj/a.stdFin:-1; vb = (b.finAdj&&b.stdFin)?b.finAdj/b.stdFin:-1; break;
      case 'bond':  va = a.bondBalance??-1; vb = b.bondBalance??-1; break;
      case 'bondc': va = (a.bondBalance&&a.population)?a.bondBalance/a.population:-1; vb = (b.bondBalance&&b.population)?b.bondBalance/b.population:-1; break;
      case 'furu':  va = a.furusatoNet??-9e9; vb = b.furusatoNet??-9e9; break;
      case 'water': va = a.waterRate??9999; vb = b.waterRate??9999; break;
      case 'taxDep': va = a.taxDependency??999; vb = b.taxDependency??999; break;
      case 'rdr':   va = a.realDebtRatio??999; vb = b.realDebtRatio??999; break;
      case 'fbr':   va = a.futBurdenRatio??999; vb = b.futBurdenRatio??999; break;
      case 'fi':    va = a.fiscalStrength??-1; vb = b.fiscalStrength??-1; break;
      case 'cer':   va = a.curExpRatio??999; vb = b.curExpRatio??999; break;
      case 'las':   va = a.laspeyres??-1; vb = b.laspeyres??-1; break;
      default:      va = a.name; vb = b.name;
    }
    if (typeof va === 'string') return asc ? va.localeCompare(vb,'ja') : vb.localeCompare(va,'ja');
    return asc ? va - vb : vb - va;
  });

  document.getElementById('rkLegend').textContent = RK_LEGENDS[_rkTab];

  const cols     = _rkCols();
  const headHtml = cols.map(c => {
    const cls = _rkSort.key === c.k ? (_rkSort.asc ? 'sort-asc' : 'sort-desc') : '';
    return `<th class="${cls}" onclick="sortRanking('${c.k}')">${c.l}</th>`;
  }).join('');
  document.getElementById('rkHead').innerHTML = `<tr>${headHtml}</tr>`;

  const rows = data.map(o => {
    const jump = `jumpToOffice('${o.name.replace(/'/g,"\\'")}')`;
    let cells  = `<td class="td-code">${o.code||'–'}</td>` +
                 `<td class="td-name" onclick="${jump}">${o.name.replace(/(役所|役場)$/,'')}</td>` +
                 `<td class="td-pref">${o.pref}</td>`;

    if (_rkTab === 0) {
      const pop  = o.population ? (o.population>=10000 ? (o.population/10000).toFixed(1)+'万' : o.population.toLocaleString()) : '–';
      const pct  = (o.population&&o.pop2040) ? (o.pop2040-o.population)/o.population*100 : null;
      const p40  = pct!=null ? `<span style="color:${pct>=0?'#1a73e8':pct>-15?'#e37400':'#c5221f'}">${pct>=0?'▲':'▼'}${Math.abs(pct).toFixed(1)}%</span>` : '–';
      const tfrC = o.tfr!=null ? (o.tfr>=1.6?'#1a73e8':o.tfr>=1.2?'#188038':o.tfr>=0.9?'#e37400':'#c5221f') : '#999';
      const ageC = o.agingRate!=null ? (o.agingRate>=40?'#c5221f':o.agingRate>=33?'#e37400':o.agingRate>=25?'#5f6368':'#1a73e8') : '#999';
      const incC = o.incomePerCapita!=null ? (o.incomePerCapita/393>=1.1?'#1a73e8':o.incomePerCapita/393<=0.8?'#c5221f':o.incomePerCapita/393<=0.9?'#e37400':'#5f6368') : '#999';
      cells += `<td class="td-num">${pop}</td>` +
        `<td class="td-num">${p40}</td>` +
        `<td class="td-num" style="color:${tfrC}">${o.tfr!=null?o.tfr.toFixed(2):'–'}</td>` +
        `<td class="td-num" style="color:${ageC}">${o.agingRate!=null?o.agingRate.toFixed(1)+'%':'–'}</td>` +
        `<td class="td-num" style="color:${incC};font-weight:600">${o.incomePerCapita!=null?o.incomePerCapita.toLocaleString()+'万':'–'}</td>`;

    } else if (_rkTab === 1) {
      const farV = (o.finAdj&&o.stdFin) ? o.finAdj/o.stdFin*100 : null;
      const farC = farV!=null ? (farV>=20?'#1a73e8':farV>=10?'#188038':farV>=5?'#e37400':'#c5221f') : '#999';
      const bond  = o.bondBalance!=null ? Math.round(o.bondBalance/100000)+'億' : '–';
      const bondc = (o.bondBalance&&o.population) ? Math.round(o.bondBalance/o.population/10)+'万' : '–';
      const furuV = o.furusatoNet;
      const furu  = furuV!=null ? `<span style="color:${furuV>=0?'#188038':'#c5221f'}">${furuV>=0?'+':''}${(furuV/1e8).toFixed(1)}億</span>` : '–';
      const waterC = o.waterRate!=null ? (o.waterRate<=2000?'#1565C0':o.waterRate<=2800?'#1a73e8':o.waterRate<=3400?'#e37400':'#c5221f') : '#999';
      const taxDepC = o.taxDependency!=null ? (o.taxDependency<=5?'#1565C0':o.taxDependency<=15?'#1a73e8':o.taxDependency<=25?'#639922':o.taxDependency<=35?'#e37400':'#c5221f') : '#999';
      cells += `<td class="td-num" style="color:${farC};font-weight:600">${farV!=null?farV.toFixed(1)+'%':'–'}</td>` +
        `<td class="td-num">${bond}</td>` +
        `<td class="td-num">${bondc}</td>` +
        `<td class="td-num">${furu}</td>` +
        `<td class="td-num" style="color:${waterC};font-weight:600">${o.waterRate!=null?o.waterRate.toLocaleString()+'円':'–'}</td>` +
        `<td class="td-num" style="color:${taxDepC};font-weight:600">${o.taxDependency!=null?o.taxDependency.toFixed(1)+'%':'–'}</td>`;

    } else if (_rkTab === 2) {
      const rdrC = o.realDebtRatio!=null ? (o.realDebtRatio<10?'#1a73e8':o.realDebtRatio<18?'#188038':o.realDebtRatio<25?'#e37400':'#c5221f') : '#999';
      const fbrC = o.futBurdenRatio!=null ? (o.futBurdenRatio<100?'#1a73e8':o.futBurdenRatio<200?'#188038':o.futBurdenRatio<350?'#e37400':'#c5221f') : '#999';
      cells += `<td class="td-num" style="color:${rdrC};font-weight:600">${o.realDebtRatio!=null?o.realDebtRatio.toFixed(1)+'%':'–'}</td>` +
        `<td class="td-num" style="color:${fbrC};font-weight:600">${o.futBurdenRatio!=null?o.futBurdenRatio.toFixed(1)+'%':'<span style="color:#aaa">–(基準未満)</span>'}</td>`;

    } else {
      const fiC  = o.fiscalStrength!=null ? (o.fiscalStrength>=1?'#1a73e8':o.fiscalStrength>=0.5?'#188038':'#c5221f') : '#999';
      const cerC = o.curExpRatio!=null ? (o.curExpRatio<80?'#1a73e8':o.curExpRatio<90?'#188038':o.curExpRatio<100?'#e37400':'#c5221f') : '#999';
      const rdrC = o.realDebtRatio!=null ? (o.realDebtRatio<10?'#1a73e8':o.realDebtRatio<18?'#188038':o.realDebtRatio<25?'#e37400':'#c5221f') : '#999';
      const fbrC = o.futBurdenRatio!=null ? (o.futBurdenRatio<100?'#1a73e8':o.futBurdenRatio<200?'#188038':o.futBurdenRatio<350?'#e37400':'#c5221f') : '#999';
      const lasC = o.laspeyres!=null ? (o.laspeyres<90?'#1a73e8':o.laspeyres<100?'#188038':o.laspeyres<102?'#e37400':'#c5221f') : '#999';
      cells += `<td class="td-num" style="color:${fiC};font-weight:600">${o.fiscalStrength!=null?o.fiscalStrength.toFixed(2):'–'}</td>` +
        `<td class="td-num" style="color:${cerC};font-weight:600">${o.curExpRatio!=null?o.curExpRatio.toFixed(1)+'%':'–'}</td>` +
        `<td class="td-num" style="color:${rdrC};font-weight:600">${o.realDebtRatio!=null?o.realDebtRatio.toFixed(1)+'%':'–'}</td>` +
        `<td class="td-num" style="color:${fbrC};font-weight:600">${o.futBurdenRatio!=null?o.futBurdenRatio.toFixed(1)+'%':'–'}</td>` +
        `<td class="td-num" style="color:${lasC};font-weight:600">${o.laspeyres!=null?o.laspeyres.toFixed(1):'–'}</td>`;
    }
    return `<tr onclick="${jump}">${cells}</tr>`;
  }).join('');

  document.getElementById('rkBody').innerHTML = rows;
  document.getElementById('rkCount').textContent = `${data.length}件`;
}

function jumpToOffice(name) {
  const o = allOffices.find(x => x.name === name);
  if (!o) return;
  map.panTo({ lat: o.lat, lng: o.lng });
  map.setZoom(15);
  closeRanking();
}
