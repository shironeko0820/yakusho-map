    }

    header {
      background: #1a73e8;
      color: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      position: relative;
      z-index: 10;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 600px;
    }

    .search-bar select,
    .search-bar input {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }

    .search-bar select {
      width: 160px;
      background: white;
      cursor: pointer;
    }

    .search-bar input {
      flex: 1;
      background: white;
    }

    .search-bar button {
      padding: 8px 16px;
      background: #0d47a1;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .search-bar button:hover { background: #1565c0; }

    #stats {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      flex-shrink: 0;
    }

    #map {
      width: 100%;
      height: calc(100vh - 56px);
    }

    /* Info window overrides */
    .gm-style .gm-style-iw-c {
      border-radius: 8px !important;
      padding: 0 !important;
      max-width: 320px !important;
    }

    .gm-style .gm-style-iw-d {
      overflow: hidden !important;
    }

    .info-window {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      min-width: 260px;
    }

    .info-window .iw-header {
      background: #1a73e8;
      color: white;
      padding: 10px 14px;
    }

    .info-window .iw-header h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .info-window .iw-header .pref {
      font-size: 12px;
      opacity: 0.85;
    }

    .info-window .iw-body {
      padding: 12px 14px;
    }

    .info-window .iw-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.4;
    }

    .info-window .iw-row .icon {
      width: 18px;
      flex-shrink: 0;
      text-align: center;
      margin-top: 1px;
    }

    .info-window .iw-row .label {
      color: #666;
      flex-shrink: 0;
      width: 56px;
    }

    .info-window .iw-row .value {
      color: #333;
    }

    .info-window .iw-row a {
      color: #1a73e8;
      text-decoration: none;
    }

    .info-window .iw-row a:hover { text-decoration: underline; }

    .info-window .iw-footer {
      padding: 8px 14px 12px;
      border-top: 1px solid #eee;
    }

    .info-window .btn-route {
      display: block;
      text-align: center;
      padding: 7px;
      background: #1a73e8;
      color: white;
      border-radius: 4px;
      text-decoration: none;
      font-size: 13px;
    }

    .info-window .btn-route:hover { background: #1565c0; }
  </style>
</head>

  { id: 52, name: "宮崎市役所", pref: "宮崎県", address: "宮崎県宮崎市橘通西1丁目1番1号", tel: "0985-21-1714", hours: "月〜金 8:30〜17:15", url: "https://www.city.miyazaki.miyazaki.jp/", lat: 31.9110, lng: 131.4239 },

  // 鹿児島県
  { id: 53, name: "鹿児島市役所", pref: "鹿児島県", address: "鹿児島県鹿児島市山下町11番1号", tel: "099-224-1111", hours: "月〜金 8:30〜17:15", url: "https://www.city.kagoshima.lg.jp/", lat: 31.5966, lng: 130.5571 },

  // 沖縄県
  { id: 54, name: "那覇市役所", pref: "沖縄県", address: "沖縄県那覇市泉崎1丁目1番1号", tel: "098-867-0111", hours: "月〜金 8:30〜17:15", url: "https://www.city.naha.okinawa.jp/", lat: 26.2124, lng: 127.6792 },
];

let map, markers = [], infoWindow;
let filteredOffices = [...OFFICES];

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 36.5, lng: 137.5 },
    zoom: 5,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
    styles: [
      { featureType: "poi.business", stylers: [{ visibility: "off" }] },
      { featureType: "transit", stylers: [{ visibility: "simplified" }] }
    ]
  });

  infoWindow = new google.maps.InfoWindow();

  // 都道府県セレクト
  const prefs = [...new Set(OFFICES.map(o => o.pref))];
  const sel = document.getElementById('prefSelect');
  prefs.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    sel.appendChild(opt);
  });

  renderMarkers(OFFICES);
}

function renderMarkers(offices) {
  markers.forEach(m => m.setMap(null));
  markers = [];

  offices.forEach(office => {
    const marker = new google.maps.Marker({
      position: { lat: office.lat, lng: office.lng },
      map,
      title: office.name,
      icon: {
        url: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png'
      }
    });

    marker.addListener('click', () => {
      const content = `
        <div class="info-window">
          <div class="iw-header">
            <h3>${office.name}</h3>
            <div class="pref">${office.pref}</div>
          </div>
          <div class="iw-body">
            <div class="iw-row">
              <span class="icon">📍</span>
              <span class="label">住所</span>
              <span class="value">${office.address}</span>
            </div>
            <div class="iw-row">
              <span class="icon">📞</span>
              <span class="label">電話</span>
              <span class="value"><a href="tel:${office.tel}">${office.tel}</a></span>
            </div>
            <div class="iw-row">
              <span class="icon">🕐</span>
              <span class="label">開庁時間</span>
              <span class="value">${office.hours}</span>
            </div>
          </div>
          <div class="iw-footer">
            <a class="btn-route"
               href="https://www.google.com/maps/dir/?api=1&destination=${office.lat},${office.lng}"
               target="_blank" rel="noopener">
              🚗 ルートを検索
            </a>
          </div>
        </div>`;
      infoWindow.setContent(content);
      infoWindow.open(map, marker);
    });

    markers.push(marker);
  });

  document.getElementById('stats').textContent = `${offices.length} 件表示中`;
}

function search() {
  const pref = document.getElementById('prefSelect').value;
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

  let result = OFFICES.filter(o => {
    const matchPref = !pref || o.pref === pref;
    const matchKw = !keyword ||
      o.name.toLowerCase().includes(keyword) ||
      o.address.toLowerCase().includes(keyword) ||
      o.pref.toLowerCase().includes(keyword);
    return matchPref && matchKw;
  });

  renderMarkers(result);

  if (result.length === 1) {
    map.setCenter({ lat: result[0].lat, lng: result[0].lng });
    map.setZoom(14);
  } else if (result.length > 1 && pref) {
    const lats = result.map(o => o.lat);
    const lngs = result.map(o => o.lng);
    const bounds = new google.maps.LatLngBounds(
      { lat: Math.min(...lats), lng: Math.min(...lngs) },
      { lat: Math.max(...lats), lng: Math.max(...lngs) }
    );
    map.fitBounds(bounds);
  }
}

function resetMap() {
  document.getElementById('prefSelect').value = '';
  document.getElementById('searchInput').value = '';
  renderMarkers(OFFICES);
  map.setCenter({ lat: 36.5, lng: 137.5 });
  map.setZoom(5);
  infoWindow.close();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});
</script>

</script>
