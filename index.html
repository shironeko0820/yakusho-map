    }

      z-index: 10;
    }

    header h1 { font-size: 20px; font-weight: 700; flex-shrink: 0; }

    .search-bar {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 600px;
    }

    .search-bar select,
    .search-bar input {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }

    .search-bar select { width: 160px; background: white; cursor: pointer; }
    .search-bar input { flex: 1; background: white; }

    .search-bar button {
      padding: 8px 16px;
      background: #0d47a1;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .search-bar button:hover { background: #1565c0; }
    #resetBtn { background: #e53935 !important; }

    #stats { color: rgba(255,255,255,0.85); font-size: 13px; flex-shrink: 0; }

    #map { width: 100%; flex: 1; min-height: 0; }

    /* ローディングオーバーレイ */
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      gap: 20px;
    }

    #loading.hidden { display: none; }

    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a73e8;
    }

    .loading-sub {
      font-size: 13px;
      color: #666;
      text-align: center;
      line-height: 1.6;
    }

    .progress-bar {
      width: 240px;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #1a73e8;
      border-radius: 3px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* エラーバナー */
    #errorBanner {
      display: none;
      background: #fff3cd;
      color: #856404;
      padding: 8px 16px;
      font-size: 13px;
      text-align: center;
      border-bottom: 1px solid #ffc107;
    }

      border-radius: 8px !important;
      padding: 0 !important;
      max-width: 300px !important;

      background: #1a73e8;
      color: white;
      padding: 10px 14px;
    }

    .iw-header h3 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .iw-header .pref { font-size: 12px; opacity: 0.85; }

    .iw-body { padding: 10px 14px; }

    .iw-row {
      display: flex;
      gap: 6px;
      margin-bottom: 7px;
      font-size: 13px;
      line-height: 1.4;
    }

    .iw-row .icon { width: 18px; flex-shrink: 0; text-align: center; }
    .iw-row .value { color: #333; }
    .iw-row a { color: #1a73e8; text-decoration: none; }
    .iw-row a:hover { text-decoration: underline; }

    .iw-footer {
      padding: 8px 14px 12px;
      border-top: 1px solid #eee;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

      width: 100%;
      text-align: center;

      cursor: pointer;

      flex-shrink: 0;
      line-height: 1;

      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;

    .cp-toolbar .cp-gmlink:hover { background: #1565c0; }

      flex: 1;
      border: none;
      width: 100%;

/* =========================================================
   設定
   ========================================================= */
const DATA_URL = './data.json'; // 静的JSONから読み込み（Vercel CDN配信）

/* =========================================================
   グローバル変数
   ========================================================= */
let map, clusterer, infoWindow;
let allOffices = [];

/* =========================================================
   Google Maps 初期化
   ========================================================= */
async function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 36.5, lng: 137.5 },
    zoom: 5,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
    styles: [
      { featureType: "poi.business", stylers: [{ visibility: "off" }] }
    ]
  });
  infoWindow = new google.maps.InfoWindow();

  setProgress(10, 'データを読み込み中...');

  try {
    allOffices = await loadOffices();
    document.getElementById('errorBanner').style.display = 'none';
  } catch (e) {
    console.error('data.json fetch failed:', e);
    allOffices = FALLBACK;
    document.getElementById('errorBanner').style.display = 'block';
  } finally {
    setProgress(90, 'マーカーを配置中...');
    buildPrefSelect(allOffices);
    renderMarkers(allOffices);
    setProgress(100, '完了');
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
    }, 300);
  }
}

/* =========================================================
   静的 data.json から自治体データを取得
   ========================================================= */
async function loadOffices() {
  setProgress(40, 'data.json を読み込み中...');
  const res = await fetch(DATA_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  setProgress(75, 'データを解析中...');
  const data = await res.json();
  setProgress(85, `${data.length} 件を読み込みました`);
  return data;
}

/* =========================================================
   マーカー描画（MarkerClusterer使用）
   ========================================================= */
function renderMarkers(offices) {
  // 既存クラスターをクリア
  if (clusterer) {
    clusterer.clearMarkers();
  }

  const markers = offices.map(office => {
    const marker = new google.maps.Marker({
      position: { lat: office.lat, lng: office.lng },
      title: office.name,
    });
    marker.addListener('click', () => openInfo(marker, office));
    return marker;
  });

  clusterer = new markerClusterer.MarkerClusterer({ map, markers });
  document.getElementById('stats').textContent = `${offices.length.toLocaleString()} 件表示中`;
}

/* =========================================================
   InfoWindow
   ========================================================= */
function openInfo(marker, o) {
  const rows = [];
  if (o.address) rows.push(`<div class="iw-row"><span class="icon">📍</span><span class="value">${o.address}</span></div>`);
  if (o.tel)     rows.push(`<div class="iw-row"><span class="icon">📞</span><span class="value"><a href="tel:${o.tel}">${o.tel}</a></span></div>`);
  if (o.hours)   rows.push(`<div class="iw-row"><span class="icon">🕐</span><span class="value">${o.hours}</span></div>`);
  if (o.url)     rows.push(`<div class="iw-row"><span class="icon">🌐</span><span class="value"><a href="${o.url}" target="_blank" rel="noopener">公式サイト</a></span></div>`);
  if (!rows.length) rows.push(`<div class="iw-row"><span class="value" style="color:#999">詳細情報なし</span></div>`);

  infoWindow.setContent(`
    <div class="info-window">
      <div class="iw-header">
        <h3>${o.name}</h3>
        ${o.pref ? `<div class="pref">${o.pref}</div>` : ''}
      </div>
      <div class="iw-body">${rows.join('')}</div>
      <div class="iw-footer">
        <a class="btn-route"
           href="https://www.google.com/maps/dir/?api=1&destination=${o.lat},${o.lng}"
           target="_blank" rel="noopener">🚗 ルートを検索</a>
        <button class="btn-congestion"
           onclick="openCongestion('${o.name.replace(/'/g,"\\'")}','${(o.pref||'').replace(/'/g,"\\'")}',${o.lat},${o.lng})">🕐 混雑時間帯を確認</button>
      </div>
    </div>`);
  infoWindow.open(map, marker);
}

/* =========================================================
   混雑時間帯パネル
   ========================================================= */
const MAPS_KEY = 'AIzaSyD4myQ-yye_b-uoEQEk_Bntf3nS_00YSWc';

function openCongestion(name, pref, lat, lng) {
  const panel = document.getElementById('congestionPanel');
  document.getElementById('cpTitle').textContent = name;

  // 座標ベース埋め込み（登録状況に関わらず常に正確な場所を表示）
  document.getElementById('cpFrame').src =
    `https://maps.google.com/maps?q=${lat},${lng}&z=17&output=embed&hl=ja`;

  // 「Googleマップで開く」リンク → 混雑する時間帯が確認できる場所ページへ
  const q = encodeURIComponent(name + (pref ? ' ' + pref : ''));
  document.getElementById('cpGmLink').href =
    `https://www.google.com/maps/place/${q}/@${lat},${lng},17z`;

  panel.classList.add('open');
}

function closeCongestion() {
  const panel = document.getElementById('congestionPanel');
  panel.classList.remove('open');
  // iframeをリセット（リソース解放）
  setTimeout(() => { document.getElementById('cpFrame').src = ''; }, 300);
}

/* =========================================================
   都道府県コード順（自治省コード順）
   ========================================================= */
const PREF_ORDER = [
  '北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県',
  '茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県',
  '新潟県','富山県','石川県','福井県','山梨県','長野県',
  '岐阜県','静岡県','愛知県','三重県',
  '滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県',
  '鳥取県','島根県','岡山県','広島県','山口県',
  '徳島県','香川県','愛媛県','高知県',
  '福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県'
];

/* =========================================================
   都道府県セレクトボックス構築
   ========================================================= */
function buildPrefSelect(offices) {
  const sel = document.getElementById('prefSelect');
  const current = sel.value;
  // 既存オプションをクリア（最初の「全て」以外）
  while (sel.options.length > 1) sel.remove(1);

  const inData = new Set(offices.map(o => o.pref).filter(Boolean));
  // コード順で並べ、データに存在するものだけ表示
  const prefs = PREF_ORDER.filter(p => inData.has(p));
  prefs.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    sel.appendChild(opt);
  });
  sel.value = current;
}

/* =========================================================
   検索・リセット
   ========================================================= */
function search() {
  const pref = document.getElementById('prefSelect').value;
  const kw   = document.getElementById('searchInput').value.trim().toLowerCase();

  const result = allOffices.filter(o => {
    const matchPref = !pref || o.pref === pref;
    const matchKw   = !kw ||
      o.name.toLowerCase().includes(kw) ||
      o.address.toLowerCase().includes(kw) ||
      o.pref.toLowerCase().includes(kw);
    return matchPref && matchKw;
  });

  renderMarkers(result);
  infoWindow.close();

  if (result.length === 1) {
    map.setCenter({ lat: result[0].lat, lng: result[0].lng });
    map.setZoom(15);
  } else if (result.length > 1 && pref) {
    const lats = result.map(o => o.lat);
    const lngs = result.map(o => o.lng);
    map.fitBounds(new google.maps.LatLngBounds(
      { lat: Math.min(...lats), lng: Math.min(...lngs) },
      { lat: Math.max(...lats), lng: Math.max(...lngs) }
    ));
  }
}

function resetMap() {
  document.getElementById('prefSelect').value = '';
  document.getElementById('searchInput').value = '';
  renderMarkers(allOffices);
  map.setCenter({ lat: 36.5, lng: 137.5 });
  map.setZoom(5);
  infoWindow.close();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});

/* =========================================================
   ローディングUI
   ========================================================= */
function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  if (msg) document.getElementById('loadingSub').textContent = msg;
}
</script>
